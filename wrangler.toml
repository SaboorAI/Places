name = "places-life-map"
main = "worker/index.js"
compatibility_date = "2026-03-09"

[assets]
directory = "."
binding = "ASSETS"

# Replace these with your Cloudflare KV namespace IDs.
[[kv_namespaces]]
binding = "STATE_STORE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_NAMESPACE_ID"
